# Dynamis AI Status Page
owner: JamesTsetsekas
repo: dynamisai-status

sites:
  - name: Dynamis AI Website
    url: https://dynamisai.io
    expectedStatusCodes:
      - 200

  - name: Dynamis AI Dashboard
    url: https://dynamisai.io/dashboard/login
    expectedStatusCodes:
      - 200

  - name: Dynamis Managed AI
    url: https://openrouter.ai/api/v1/models
    expectedStatusCodes:
      - 200

  - name: Anthropic API
    url: https://api.anthropic.com/v1/messages
    expectedStatusCodes:
      - 405

  - name: OpenAI API
    url: https://api.openai.com/v1/models
    expectedStatusCodes:
      - 401

  - name: Google AI API
    url: https://generativelanguage.googleapis.com/v1beta/models
    expectedStatusCodes:
      - 403

  - name: Groq API
    url: https://api.groq.com/openai/v1/models
    expectedStatusCodes:
      - 401

  - name: Mistral API
    url: https://api.mistral.ai/v1/models
    expectedStatusCodes:
      - 401

status-website:
  cname: status.dynamisai.io
  name: Dynamis AI Status
  theme: dark
  logoUrl: https://dynamisai.io/favicon.svg
  favicon: https://dynamisai.io/favicon.svg
  navbar:
    - title: Dynamis AI
      href: https://dynamisai.io
    - title: Docs
      href: https://dynamisai.io/docs
  footerBuilder: false

  i18n:
    activeIncidents: Active Incidents
    allSystemsOperational: All Systems Operational
    incidentReport: Incident Report

user-agent: "Dynamis AI Uptime Monitor"

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"
